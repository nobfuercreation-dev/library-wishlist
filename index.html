<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>図書館ブックリスト</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>図書館ブックリスト</h1>
      <p class="subtitle">図書館名を入力すると、借りたい本を一覧表示します</p>
    </header>

    <main>
      <section class="card search-section" aria-labelledby="search-heading">
        <h2 id="search-heading">図書館を検索</h2>
        <div class="search-row">
          <input
            type="text"
            id="library-search"
            list="library-suggestions"
            placeholder="例：市立中央図書館"
            autocomplete="off"
          >
          <datalist id="library-suggestions"></datalist>
          <button type="button" id="search-btn" class="btn btn-primary">表示</button>
          <button type="button" id="clear-search-btn" class="btn btn-ghost">すべて表示</button>
        </div>
        <p id="search-result-label" class="result-label" hidden></p>
      </section>

      <section class="card add-section" aria-labelledby="add-heading">
        <h2 id="add-heading">本を登録</h2>
        <form id="book-form">
          <div class="form-grid">
            <label>
              書名 <span class="required">*</span>
              <input type="text" id="book-title" required placeholder="例：独学大全">
            </label>
            <label>
              著者
              <input type="text" id="book-author" placeholder="例：読書猿">
            </label>
            <label>
              図書館 <span class="required">*</span>
              <input type="text" id="book-library" required placeholder="例：市立中央図書館">
            </label>
            <label>
              メモ
              <input type="text" id="book-note" placeholder="例：2階、新刊コーナー近く">
            </label>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">登録する</button>
            <button type="button" class="btn btn-ghost" id="cancel-edit-btn" hidden>編集をキャンセル</button>
          </div>
        </form>
      </section>

      <section class="card list-section" aria-labelledby="list-heading">
        <div class="list-header">
          <h2 id="list-heading">登録済みの本</h2>
          <span id="book-count" class="badge">0 冊</span>
        </div>
        <div id="book-list" class="book-list">
          <p class="empty-state">まだ本が登録されていません。上のフォームから追加してください。</p>
        </div>
      </section>

      <section class="card data-section" aria-labelledby="data-heading">
        <h2 id="data-heading">データ管理</h2>
        <p class="hint">データはこのブラウザに保存されます。バックアップのためにエクスポートをおすすめします。</p>
        <div class="data-actions">
          <button type="button" id="export-btn" class="btn btn-secondary">JSONでエクスポート</button>
          <label class="btn btn-secondary import-label">
            JSONをインポート
            <input type="file" id="import-input" accept=".json,application/json" hidden>
          </label>
        </div>
      </section>
    </main>
  </div>

  <template id="book-item-template">
    <article class="book-item">
      <div class="book-info">
        <h3 class="book-title"></h3>
        <p class="book-meta"></p>
        <p class="book-note"></p>
      </div>
      <div class="book-actions">
        <button type="button" class="btn btn-small btn-ghost edit-btn">編集</button>
        <button type="button" class="btn btn-small btn-danger delete-btn">削除</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
